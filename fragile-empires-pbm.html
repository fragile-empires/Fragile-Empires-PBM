<!--
  ============================================================================
  FRAGILE EMPIRES — TIER 1 PLAYABLE PROTOTYPE (STANDALONE / DEPLOYABLE)
  ============================================================================

  This is a self-contained single file. Drop it on any web host (Netlify,
  Vercel, GitHub Pages, your own server) and it runs.

  WHAT WORKS OUT OF THE BOX (no backend needed):
    - Full character creation (all 12 species, 7 careers, variants, origins, attributes)
    - Live character sheet
    - Turn card form
    - Fog-of-war map

  THE AI GAME MASTER — READ THIS:
    The GM needs to call Claude. You CANNOT put your Anthropic API key in this
    file, because it ships to the browser and anyone can steal it. You have two
    options:

    OPTION A — Host a tiny proxy (recommended).
      Stand up one serverless function (Cloudflare Worker / Vercel / Netlify
      function) that holds your key server-side and forwards requests to
      Anthropic. Then set GM_ENDPOINT below to that function's URL.
      A reference Cloudflare Worker is included at the bottom of this comment.

    OPTION B — Offline / demo mode.
      Leave GM_ENDPOINT as "" (empty). The GM will use a built-in local
      fallback that returns scripted-but-randomized narration so you can demo
      the full UI flow without any backend. Good for showing the interface;
      not a real AI GM.

  CONFIG: edit the GM_ENDPOINT constant in the <script> below.

  ----------------------------------------------------------------------------
  REFERENCE CLOUDFLARE WORKER (Option A) — deploy separately, paste your key:

    export default {
      async fetch(request, env) {
        if (request.method === "OPTIONS")
          return new Response(null, {headers: cors()});
        if (request.method !== "POST")
          return new Response("POST only", {status: 405, headers: cors()});
        const body = await request.json();
        const r = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": env.ANTHROPIC_API_KEY,        // set as a Worker secret
            "anthropic-version": "2023-06-01"
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-20250514",
            max_tokens: 1000,
            system: body.system,
            messages: body.messages
          })
        });
        const data = await r.json();
        return new Response(JSON.stringify(data), {headers: cors()});
      }
    };
    function cors() {
      return {
        "Access-Control-Allow-Origin": "*",          // tighten to your domain
        "Access-Control-Allow-Methods": "POST, OPTIONS",
        "Access-Control-Allow-Headers": "Content-Type"
      };
    }

  Set the secret with:  wrangler secret put ANTHROPIC_API_KEY
  ----------------------------------------------------------------------------

  ALL GAME DATA below is canonical, sourced from the Fragile Empires Core
  Rulebook and Quickstart. Tone and GM behaviour are tuned to the gritty,
  grounded voice of the books.
  ============================================================================
-->

<style>
:root{
  --bg-primary:#ffffff;
  --bg-secondary:#f4f3ee;
  --bg-tertiary:#eceae2;
  --text-primary:#1a1a18;
  --text-secondary:#5f5e5a;
  --text-tertiary:#8a8980;
  --text-info:#185fa5;
  --text-danger:#a32d2d;
  --text-warning:#854f0b;
  --text-success:#0f6e56;
  --bg-info:#e6f1fb;
  --bg-danger:#fcebeb;
  --bg-warning:#faeeda;
  --bg-success:#e1f5ee;
  --border-tertiary:rgba(26,26,24,0.12);
  --border-secondary:rgba(26,26,24,0.25);
  --border-primary:rgba(26,26,24,0.4);
  --radius-md:8px;
  --radius-lg:12px;
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg-primary:#211f1c;
    --bg-secondary:#2a2825;
    --bg-tertiary:#1a1916;
    --text-primary:#ece9e2;
    --text-secondary:#a8a59c;
    --text-tertiary:#76746c;
    --text-info:#85b7eb;
    --text-danger:#f09595;
    --text-warning:#fac775;
    --text-success:#5dcaa5;
    --bg-info:#0c2333;
    --bg-danger:#331616;
    --bg-warning:#332507;
    --bg-success:#0a2820;
    --border-tertiary:rgba(236,233,226,0.14);
    --border-secondary:rgba(236,233,226,0.28);
    --border-primary:rgba(236,233,226,0.42);
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-sans);color:var(--text-primary);background:var(--bg-tertiary);min-height:100vh;padding:1.5rem 1rem}
.app{max-width:720px;margin:0 auto;background:var(--bg-tertiary);padding:1rem 0}
h1{font-size:24px;font-weight:500;letter-spacing:0.04em;margin-bottom:4px}
h2{font-size:18px;font-weight:500;margin-bottom:1rem}
h3{font-size:16px;font-weight:500;margin-bottom:8px}
p{font-size:15px;line-height:1.7;color:var(--text-secondary)}
.muted{font-size:13px;color:var(--text-tertiary)}
.card{background:var(--bg-primary);border:0.5px solid var(--border-tertiary);border-radius:var(--radius-lg);padding:1.25rem}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border:0.5px solid var(--border-secondary);border-radius:var(--radius-md);background:transparent;font-size:14px;font-weight:500;cursor:pointer;color:var(--text-primary);font-family:var(--font-sans)}
.btn:hover{background:var(--bg-secondary)}
.btn:active{transform:scale(0.98)}
.btn:disabled{opacity:0.4;cursor:not-allowed}
.btn-primary{background:var(--text-primary);color:var(--bg-primary);border-color:var(--text-primary)}
.btn-primary:hover{opacity:0.85;background:var(--text-primary)}
.btn-sm{padding:5px 12px;font-size:13px}
input,select,textarea{font-family:var(--font-sans);font-size:14px;color:var(--text-primary);background:var(--bg-primary);border:0.5px solid var(--border-secondary);border-radius:var(--radius-md);padding:8px 12px;width:100%}
textarea{resize:vertical;line-height:1.6}
input:focus,textarea:focus{outline:none;box-shadow:0 0 0 2px var(--bg-info)}
label{font-size:13px;color:var(--text-secondary);display:block;margin-bottom:4px}
.field{margin-bottom:1rem}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.divider{border:none;border-top:0.5px solid var(--border-tertiary);margin:1.25rem 0}
.step-indicator{display:flex;gap:6px;margin-bottom:1.5rem;flex-wrap:wrap}
.step-dot{width:8px;height:8px;border-radius:50%;background:var(--border-secondary)}
.step-dot.done{background:var(--text-success)}
.step-dot.active{background:var(--text-primary)}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat-box{background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px 12px;text-align:center}
.stat-box .val{font-size:22px;font-weight:500;line-height:1.2}
.stat-box .lbl{font-size:11px;color:var(--text-tertiary);text-transform:uppercase;letter-spacing:0.06em}
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px 16px}
.skill-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;border-bottom:0.5px solid var(--border-tertiary);font-size:13px}
.skill-row .sk-name{color:var(--text-secondary)}
.skill-row .sk-val{font-weight:500;min-width:18px;text-align:right}
.map-grid{display:grid;grid-template-columns:repeat(12,1fr);gap:2px;margin:12px 0}
.cell{aspect-ratio:1;border-radius:3px;font-size:9px;display:flex;align-items:center;justify-content:center;position:relative}
.cell-fog{background:var(--border-tertiary);opacity:0.6}
.cell-visible{background:var(--bg-secondary);border:0.5px solid var(--border-tertiary)}
.cell-wall{background:var(--text-tertiary);opacity:0.4}
.cell-player{background:#3c3489;color:#fff}
.cell-npc{background:#993c1d;color:#fff}
.cell-item{background:#0f6e56;color:#fff}
.cell-threat{background:#a32d2d;color:#fff;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.6}}
.narrative-box{background:var(--bg-secondary);border-left:3px solid var(--border-secondary);padding:1rem 1.25rem;font-size:14px;line-height:1.8;white-space:pre-wrap;min-height:80px;color:var(--text-primary)}
.sheet-section{margin-bottom:1.25rem}
.spinner{width:24px;height:24px;border:2px solid var(--border-tertiary);border-top-color:var(--text-primary);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.condition-tag{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:var(--radius-md);background:var(--bg-warning);color:var(--text-warning);font-size:12px;margin:2px}
.hp-bar-wrap{height:8px;background:var(--bg-secondary);border-radius:4px;overflow:hidden;margin:4px 0 8px}
.hp-bar{height:100%;border-radius:4px;transition:width 0.4s}
.san-bar-wrap{height:6px;background:var(--bg-secondary);border-radius:4px;overflow:hidden;margin:4px 0 8px}
.san-bar{height:100%;border-radius:4px;background:#534ab7;transition:width 0.4s}
.tab-row{display:flex;gap:0;border-bottom:0.5px solid var(--border-tertiary);margin-bottom:1.25rem}
.tab{padding:8px 16px;font-size:14px;cursor:pointer;border-bottom:2px solid transparent;color:var(--text-secondary);background:none;border-top:none;border-left:none;border-right:none;font-family:var(--font-sans)}
.tab.active{color:var(--text-primary);border-bottom-color:var(--text-primary);font-weight:500}
.gear-item{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:0.5px solid var(--border-tertiary);font-size:13px}
.gear-name{font-weight:500}
.gear-stat{color:var(--text-tertiary);font-size:12px;text-align:right}
.origin-card,.spec-card{border:0.5px solid var(--border-tertiary);border-radius:var(--radius-md);padding:10px 12px;cursor:pointer;transition:border-color 0.15s}
.origin-card:hover,.spec-card:hover{border-color:var(--border-primary)}
.origin-card.selected,.spec-card.selected{border-color:var(--text-primary);background:var(--bg-secondary)}
.origin-name{font-size:13px;font-weight:500}
.origin-bonus{font-size:12px;color:var(--text-secondary)}
.spec-card{margin-bottom:8px}
.attr-row{display:flex;align-items:center;gap:12px;margin-bottom:8px}
.attr-label{font-size:13px;color:var(--text-secondary);min-width:70px}
.attr-val{font-size:16px;font-weight:500;min-width:24px;text-align:center}
.attr-btns{display:flex;gap:4px;align-items:center}
.attr-btn{width:26px;height:26px;border-radius:4px;border:0.5px solid var(--border-secondary);background:transparent;cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;color:var(--text-primary)}
.attr-btn:disabled{opacity:0.3;cursor:not-allowed}
.pts-left{font-size:13px;color:var(--text-info);margin-bottom:1rem}
.action-option{border:0.5px solid var(--border-tertiary);border-radius:var(--radius-md);padding:10px 14px;margin-bottom:8px;cursor:pointer}
.action-option:hover{border-color:var(--border-secondary);background:var(--bg-secondary)}
.action-option.selected{border-color:var(--text-primary);background:var(--bg-secondary)}
.action-label{font-size:13px;font-weight:500}
.action-desc{font-size:12px;color:var(--text-secondary);margin-top:2px}
.log-entry{font-size:12px;color:var(--text-secondary);padding:4px 0;border-bottom:0.5px solid var(--border-tertiary)}
.log-entry:last-child{border:none}
.log-turn{color:var(--text-tertiary);font-size:11px;margin-right:6px}
.header{text-align:center;margin-bottom:1.5rem}
.header h1{margin-bottom:2px}
.header .sub{font-size:12px;color:var(--text-tertiary);letter-spacing:0.1em;text-transform:uppercase}
.demo-banner{background:var(--bg-warning);color:var(--text-warning);font-size:12px;padding:8px 12px;border-radius:var(--radius-md);margin-bottom:1rem;text-align:center}
</style>
</head>

function applyVariantBonuses(){
  const c=state.char,sk=c.skills;
  DATA.skills.forEach(s=>sk[s]=0);
  if(c.career&&DATA.careers[c.career])
    Object.entries(DATA.careers[c.career].startSkills).forEach(([s,v])=>sk[s]+=v);
  function apply(str){str.split(",").map(s=>s.trim()).forEach(p=>{
    const m=p.match(/\+(\d+)\s+(\w+)/);if(m&&sk.hasOwnProperty(m[2]))sk[m[2]]+=parseInt(m[1]);});}
  if(c.species&&c.head){const hv=DATA.variants[c.species]?.heads.find(h=>h.n===c.head);if(hv)apply(hv.b);}
  if(c.species&&c.arms){const av=DATA.variants[c.species]?.arms.find(a=>a.n===c.arms);if(av)apply(av.b);}
  if(c.species&&c.legs){const lv=DATA.variants[c.species]?.legs.find(l=>l.n===c.legs);if(lv)apply(lv.b);}
  if(c.origin){const o=DATA.origins.find(o=>o.name===c.origin);if(o&&sk.hasOwnProperty(o.bonus))sk[o.bonus]+=1;}
}
function finalizeChar(){
  applyVariantBonuses();
  const c=state.char,g=state.game;
  g.maxHp=c.attrs.Body*3;
  if(c.species==="Drask")g.maxHp+=4; /* Drask Endurance: +4 HP base */
  g.hp=g.maxHp;g.def=8+c.attrs.Agility;
  if(["Mercenary","Bounty Hunter","Commander"].includes(c.career))g.def+=1;
  g.sanity=6;g.maxSanity=7;g.gameStarted=false;initMap();
}

function initMap(){
  const g=state.game,W=12,H=8;g.mapData=[];
  for(let y=0;y<H;y++){const row=[];for(let x=0;x<W;x++){
    let t="empty";if(x===0||x===W-1||y===0||y===H-1)t="wall";else if(Math.random()<0.12)t="wall";
    row.push({t,npc:null,item:null});}g.mapData.push(row);}
  g.playerPos={x:1,y:1};g.mapData[1][1].t="empty";g.revealed=new Set();revealAround(1,1,3);
  if(g.mapData[3]?.[4])g.mapData[3][4].npc="threat";
  if(g.mapData[5]?.[7])g.mapData[5][7].npc="npc";
  if(g.mapData[4]?.[3])g.mapData[4][3].item=true;
}
function revealAround(cx,cy,r){const g=state.game;
  for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){const x=cx+dx,y=cy+dy;
    if(x>=0&&x<12&&y>=0&&y<8)g.revealed.add(x+","+y);}}
function rollDice(s){return Math.floor(Math.random()*s)+1;}

function buildSystemPrompt(){
  const c=state.char,g=state.game;
  return `You are the Void Master (GM) for FRAGILE EMPIRES, a gritty sci-fi survival TTRPG. The player controls a single character. Tone: dark, grounded, gritty. No heroics. Consequences are real. The world doesn't care about the player. Danger is everywhere.

STRICT RULES:
- Keep narrative responses to 3-5 sentences. Terse, atmospheric, present-tense.
- Always end with one concrete choice or observation the player must contend with.
- Never guarantee safety. Characters can be hurt, lose equipment, or die.
- Respect the character sheet data provided.
- Apply skill checks narratively (2d6 drop lowest + attribute + skill vs TN 10 standard).
- If HP reaches 0, character is downed. If Sanity hits 0, major consequence.
- Keep the world living: NPCs have their own agendas, time passes.

CHARACTER:
Name: ${c.name} | Species: ${c.species} (${c.head} / ${c.arms} / ${c.legs})
Career: ${c.career} | Origin: ${c.origin}
Attributes: Might ${c.attrs.Might} Agility ${c.attrs.Agility} Wits ${c.attrs.Wits} Body ${c.attrs.Body} Will ${c.attrs.Will} Presence ${c.attrs.Presence}
HP: ${g.hp}/${g.maxHp} | Sanity: ${g.sanity}/${g.maxSanity} | Defense: ${g.def}
Key Skills: Melee ${c.skills.Melee} Ranged ${c.skills.Ranged} Stealth ${c.skills.Stealth} Perception ${c.skills.Perception} Medicine ${c.skills.Medicine}
Conditions: ${g.conditions.length?g.conditions.join(", "):"None"}
Turn: ${g.turnNum}

Respond ONLY in this JSON format (no preamble, no markdown):
{"narrative":"...","hp_change":0,"sanity_change":0,"condition_add":"","condition_remove":"","log_entry":"..."}`;
}

async function callGM(userPrompt,actionId){
  const g=state.game;g.pendingGM=true;render();
  if(!GM_ENDPOINT){
    await new Promise(r=>setTimeout(r,900));
    let text;
    if(!g.gameStarted){text=LOCAL_OPENINGS[Math.floor(Math.random()*LOCAL_OPENINGS.length)];}
    else{const pool=LOCAL_RESPONSES[actionId]||LOCAL_RESPONSES.other;text=pool[Math.floor(Math.random()*pool.length)];}
    g.narrative=text;
    if(actionId==="attack"){g.hp=Math.max(0,g.hp-rollDice(6));}
    if(actionId==="move_fast"&&Math.random()<0.5){g.hp=Math.max(0,g.hp-rollDice(4));}
    g.log.unshift({turn:g.turnNum,text:(actionId?"["+actionId+"] ":"")+text.slice(0,60)+"…"});
    g.turnNum++;g.gameStarted=true;g.selectedAction="";g.actionDetail="";
    g.pendingGM=false;render();return;
  }
  try{
    const resp=await fetch(GM_ENDPOINT,{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({system:buildSystemPrompt(),messages:[{role:"user",content:userPrompt}]})});
    const data=await resp.json();
    const raw=(data.content||[]).map(i=>i.text||"").join("").replace(/```json|```/g,"").trim();
    let p;try{p=JSON.parse(raw);}catch(e){p={narrative:raw,hp_change:0,sanity_change:0,log_entry:"Turn resolved."};}
    g.narrative=p.narrative||"The void offers no answer.";
    if(p.hp_change)g.hp=Math.max(0,Math.min(g.maxHp,g.hp+p.hp_change));
    if(p.sanity_change)g.sanity=Math.max(0,Math.min(g.maxSanity,g.sanity+p.sanity_change));
    if(p.condition_add&&!g.conditions.includes(p.condition_add))g.conditions.push(p.condition_add);
    if(p.condition_remove)g.conditions=g.conditions.filter(x=>x!==p.condition_remove);
    if(p.log_entry)g.log.unshift({turn:g.turnNum,text:p.log_entry});
    g.turnNum++;g.gameStarted=true;g.selectedAction="";g.actionDetail="";
  }catch(e){g.narrative="The void swallows the signal. The GM could not be reached. Check your GM_ENDPOINT configuration.";}
  g.pendingGM=false;render();
}
function startGame(){const c=state.char;const hw=GALAXY.homeworlds[c.species];
  callGM(`The game begins. ${c.name}, a ${c.species} ${c.career} (origin ${c.origin}), is in ${hw.capital}, the capital city of ${hw.world}, homeworld of the ${hw.empire}. Set an immediate, dangerous opening scene grounded in this location.`,null);}
function submitTurn(){
  const g=state.game;if(!g.selectedAction)return;
  const a=DATA.actions.find(x=>x.id===g.selectedAction);const d=g.actionDetail.trim();
  callGM(`Turn ${g.turnNum}. Player chooses: "${a.label}". ${d?`Note: "${d}"`:""} Resolve this. HP ${g.hp}/${g.maxHp}, Sanity ${g.sanity}/${g.maxSanity}.`,g.selectedAction);
  if(g.selectedAction==="move_cautious"||g.selectedAction==="move_fast"){
    const{x,y}=g.playerPos;
    const dirs=[[1,0],[-1,0],[0,1],[0,-1]].filter(([dx,dy])=>{const nx=x+dx,ny=y+dy;
      return nx>=0&&nx<12&&ny>=0&&ny<8&&g.mapData[ny][nx].t!=="wall";});
    if(dirs.length){const[dx,dy]=dirs[Math.floor(Math.random()*dirs.length)];
      g.playerPos={x:x+dx,y:y+dy};revealAround(g.playerPos.x,g.playerPos.y,2);}}
}

  bindEvents();}

      <div style="display:flex;gap:8px;align-items:center">
        <div><div class="muted" style="font-size:11px;text-align:right">HP ${g.hp}/${g.maxHp}</div>
          <div class="hp-bar-wrap" style="width:80px"><div class="hp-bar" style="width:${Math.max(0,Math.round(g.hp/g.maxHp*100))}%;background:${g.hp/g.maxHp>0.5?"#1d9e75":g.hp/g.maxHp>0.25?"#ef9f27":"#e24b4a"}"></div></div></div>
        <div><div class="muted" style="font-size:11px;text-align:right">SAN ${g.sanity}/${g.maxSanity}</div>
          <div class="san-bar-wrap" style="width:80px"><div class="san-bar" style="width:${Math.round(g.sanity/g.maxSanity*100)}%"></div></div></div></div></div>
    <div class="tab-row">${tabs.map((t,i)=>`<button class="tab ${g.activeTab===t?"active":""}" data-tab="${t}">${labels[i]}</button>`).join("")}</div>
    ${g.activeTab==="play"?renderPlay():g.activeTab==="sheet"?renderSheet():g.activeTab==="map"?renderMap():renderLog()}</div>`;}

function renderPlay(){const g=state.game;
  return `<div style="position:relative">
    ${g.conditions.length?`<div style="margin-bottom:8px">${g.conditions.map(c=>`<span class="condition-tag">${esc(c)}</span>`).join("")}</div>`:""}
    ${g.narrative?`<div class="narrative-box" style="margin-bottom:1rem">${esc(g.narrative)}</div>`:`<div class="narrative-box" style="margin-bottom:1rem;color:var(--text-tertiary);font-style:italic">Waiting for the void…</div>`}
    ${g.pendingGM?`<div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem"><div class="spinner"></div><span class="muted">The Void Master is watching…</span></div>`:""}
    ${!g.gameStarted&&!g.pendingGM?`<button class="btn btn-primary" id="start-game" style="width:100%;margin-bottom:1rem">Enter the void — begin session →</button>`:""}
    ${g.gameStarted&&!g.pendingGM?`<div><h3 style="margin-bottom:8px">Your action</h3>
      ${DATA.actions.map(a=>`<div class="action-option ${g.selectedAction===a.id?"selected":""}" data-action="${a.id}">
        <div class="action-label">${a.label}</div><div class="action-desc">${a.desc}</div></div>`).join("")}
      <div class="field" style="margin-top:8px"><label>Add detail (optional)</label>
        <textarea id="action-detail" rows="2" placeholder="Describe your approach, target, or intent…">${esc(g.actionDetail)}</textarea></div>
      <button class="btn btn-primary" id="submit-turn" style="width:100%;margin-top:8px" ${!g.selectedAction?"disabled":""}>Submit turn →</button></div>`:""}</div>`;}

function renderSheet(){const c=state.char,g=state.game;
  return `<div>
    <div class="card" style="margin-bottom:1rem">
      <div class="sheet-section"><h3 style="margin-bottom:6px">Status</h3>
        <div class="stat-grid">
          <div class="stat-box"><div class="val">${g.hp}/${g.maxHp}</div><div class="lbl">HP</div></div>
          <div class="stat-box"><div class="val">${g.def}</div><div class="lbl">Defense</div></div>
          <div class="stat-box"><div class="val">${g.sanity}/${g.maxSanity}</div><div class="lbl">Sanity</div></div></div>
        ${g.conditions.length?`<div style="margin-top:8px">${g.conditions.map(c=>`<span class="condition-tag">${esc(c)}</span>`).join("")}</div>`:""}</div>
      <div class="divider"></div>
      <div class="sheet-section"><h3 style="margin-bottom:8px">Attributes</h3>
        <div class="row3">${DATA.attributes.map(a=>`<div class="stat-box"><div class="val">${c.attrs[a]}</div><div class="lbl">${a}</div></div>`).join("")}</div></div>
      <div class="divider"></div>
      <div class="sheet-section"><h3 style="margin-bottom:8px">Skills</h3>
        <div class="skill-grid">${DATA.skills.map(s=>`<div class="skill-row"><span class="sk-name">${s}</span><span class="sk-val">${c.skills[s]}</span></div>`).join("")}</div></div></div>
    <div class="card" style="margin-bottom:1rem"><h3 style="margin-bottom:8px">Abilities</h3>
      <div style="font-size:12px;font-weight:500;color:var(--text-tertiary);margin-bottom:4px">TIER 1 — ${c.career.toUpperCase()}</div>
      <p style="font-size:13px;color:var(--text-secondary);margin-bottom:8px">${DATA.careers[c.career].t1}</p>
      <div style="font-size:12px;font-weight:500;color:var(--text-tertiary);margin-bottom:4px">SPECIES — ${c.species.toUpperCase()}</div>
      ${DATA.species[c.species].abilities.map(a=>`<p style="font-size:13px;color:var(--text-secondary);margin-bottom:4px">${a}</p>`).join("")}</div>
    <div class="card"><h3 style="margin-bottom:8px">Gear</h3>
      ${Object.entries(DATA.careers[c.career].gear).map(([k,v])=>`<div class="gear-item"><span class="gear-name">${k[0].toUpperCase()+k.slice(1)}</span><span class="gear-stat">${v}</span></div>`).join("")}
      <div class="gear-item"><span class="gear-name">Also carries</span><span class="gear-stat">Utility Droid · Corvette · Void Suit</span></div>
      <div class="gear-item"><span class="gear-name">Wealth Tier</span><span class="gear-stat">1 — Scrap</span></div></div></div>`;}

function renderMap(){const g=state.game,W=12,H=8,px=g.playerPos.x,py=g.playerPos.y;let cells="";
  for(let y=0;y<H;y++)for(let x=0;x<W;x++){
    const key=x+","+y,rev=g.revealed.has(key),cell=g.mapData[y]?.[x]||{t:"empty"};
    if(!rev){cells+=`<div class="cell cell-fog"></div>`;continue;}
    if(x===px&&y===py){cells+=`<div class="cell cell-player" title="You">◆</div>`;continue;}
    if(cell.npc==="threat"){cells+=`<div class="cell cell-threat" title="Threat">!</div>`;continue;}
    if(cell.npc==="npc"){cells+=`<div class="cell cell-npc" title="Contact">?</div>`;continue;}
    if(cell.item){cells+=`<div class="cell cell-item" title="Item">★</div>`;continue;}
    if(cell.t==="wall"){cells+=`<div class="cell cell-wall"></div>`;continue;}
    cells+=`<div class="cell cell-visible"></div>`;}
  return `<div><div class="card" style="margin-bottom:1rem"><h3 style="margin-bottom:8px">Local area — fog of war</h3>
    <div class="map-grid">${cells}</div>
    <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:11px;color:var(--text-tertiary)">
      <span><span style="background:#3c3489;color:#fff;padding:1px 6px;border-radius:3px">◆</span> You</span>
      <span><span style="background:#a32d2d;color:#fff;padding:1px 6px;border-radius:3px">!</span> Threat</span>
      <span><span style="background:#993c1d;color:#fff;padding:1px 6px;border-radius:3px">?</span> Contact</span>
      <span><span style="background:#0f6e56;color:#fff;padding:1px 6px;border-radius:3px">★</span> Item</span></div></div>
    <p style="font-size:13px;color:var(--text-secondary)">Map reveals as you move. Threats pulse red. Moving actions expand your range.</p></div>`;}

function renderLog(){const g=state.game;
  if(!g.log.length)return`<div class="card"><p style="font-size:13px;color:var(--text-tertiary)">No entries yet. Play a turn to begin the record.</p></div>`;
  return `<div class="card"><h3 style="margin-bottom:8px">Turn log</h3>
    ${g.log.map(e=>`<div class="log-entry"><span class="log-turn">T${e.turn}</span>${esc(e.text)}</div>`).join("")}</div>`;}

/* ============================ EVENTS ====================================== */
function bindEvents(){
  const q=id=>document.getElementById(id);
  if(state.phase==="create"){
    const ni=q("char-name");if(ni)ni.oninput=()=>{state.char.name=ni.value;const b=q("step-next");if(b)b.disabled=!ni.value.trim();};
    document.querySelectorAll("[data-spec]").forEach(el=>el.onclick=()=>{state.char.species=el.dataset.spec;state.char.head=state.char.arms=state.char.legs="";render();});
    document.querySelectorAll("[data-variant]").forEach(el=>el.onclick=()=>{state.char[el.dataset.variant]=el.dataset.val;render();});
    document.querySelectorAll("[data-career]").forEach(el=>el.onclick=()=>{state.char.career=el.dataset.career;render();});
    document.querySelectorAll("[data-origin]").forEach(el=>el.onclick=()=>{state.char.origin=el.dataset.origin;render();});
    const rb=q("roll-origin");if(rb)rb.onclick=()=>{const t=rollDice(6)+rollDice(6);const idx=Math.max(0,Math.min(DATA.origins.length-1,t-2));state.char.origin=DATA.origins[idx].name;render();};
    document.querySelectorAll("[data-attr]").forEach(el=>el.onclick=()=>{const a=el.dataset.attr,op=el.dataset.op,cur=state.char.attrs[a];
      if(op==="plus"&&cur<6&&state.char.attrPointsLeft>0&&(cur-4)<2){state.char.attrs[a]++;state.char.attrPointsLeft--;}
      else if(op==="minus"&&cur>4){state.char.attrs[a]--;state.char.attrPointsLeft++;}render();});
    const nb=q("step-next");if(nb)nb.onclick=()=>{state.createStep=Math.min(createSteps.length-1,state.createStep+1);render();};
    const bb=q("begin-game");if(bb)bb.onclick=()=>{finalizeChar();state.phase="galaxy";render();};
  }else if(state.phase==="galaxy"){
    const solo=q("solo-adventure");
    if(solo)solo.onclick=()=>{state.phase="game";render();};
    const toggleBtn=q("toggle-full-sheet");
    const sheet=q("full-sheet");
    if(toggleBtn&&sheet){
      toggleBtn.onclick=()=>{
        const open=sheet.style.display!=="none";
        sheet.style.display=open?"none":"block";
        toggleBtn.textContent=open?"View full character sheet ↓":"Hide character sheet ↑";
      };
    }
    const closeBtn=q("close-full-sheet");
    if(closeBtn&&sheet){
      closeBtn.onclick=()=>{
        sheet.style.display="none";
        if(toggleBtn)toggleBtn.textContent="View full character sheet ↓";
      };
    }
  }else{
    document.querySelectorAll("[data-tab]").forEach(el=>el.onclick=()=>{state.game.activeTab=el.dataset.tab;render();});
    const sg=q("start-game");if(sg)sg.onclick=()=>startGame();
    document.querySelectorAll("[data-action]").forEach(el=>el.onclick=()=>{state.game.selectedAction=el.dataset.action;render();});
    const ad=q("action-detail");if(ad)ad.oninput=()=>{state.game.actionDetail=ad.value;};
    const st=q("submit-turn");if(st)st.onclick=()=>submitTurn();
  }
}
render();
</script>
</body>
</html>
